<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#152238;
    --ink-soft:#3d4a68;
    --paper:#f6f4ee;
    --panel:#ffffff;
    --gold:#b98a3f;
    --gold-soft:#e8d3ab;
    --teal:#2f6f63;
    --teal-soft:#e2ede9;
    --line:#e3ddce;
    --shadow: 0 1px 2px rgba(21,34,56,0.04), 0 8px 24px rgba(21,34,56,0.06);
  }
  *{box-sizing:border-box;}
  .iaasse-root{
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    border-radius:16px;
    max-width:720px;
    margin:0 auto;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  .iaasse-header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:22px 24px;
    background:linear-gradient(135deg,var(--ink) 0%, #223454 100%);
    color:#f6f4ee;
    position:relative;
  }
  .iaasse-crest{
    width:42px;height:42px;border-radius:50%;
    background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .iaasse-crest svg{width:22px;height:22px;}
  .iaasse-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:0.2px;}
  .iaasse-sub{font-size:12.5px;color:#c9d0e0;margin-top:2px;}
  .iaasse-status{
    margin-left:auto;display:flex;align-items:center;gap:6px;
    font-size:11.5px;color:#c9d0e0;
  }
  .iaasse-dot{width:7px;height:7px;border-radius:50%;background:#5fbf8f;box-shadow:0 0 0 3px rgba(95,191,143,0.2);}

  .iaasse-chips{
    display:flex;gap:8px;padding:14px 20px 4px;flex-wrap:wrap;
    background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .iaasse-chip{
    font-family:'Inter';font-size:12.5px;font-weight:500;
    padding:7px 13px;border-radius:100px;
    background:var(--teal-soft);color:var(--teal);
    border:1px solid transparent;cursor:pointer;
    transition:all .15s ease;
  }
  .iaasse-chip:hover{border-color:var(--teal);}

  .iaasse-body{
    background:var(--panel);
    height:420px;overflow-y:auto;
    padding:20px;
    display:flex;flex-direction:column;gap:14px;
  }
  .iaasse-msg{display:flex;gap:10px;max-width:88%;}
  .iaasse-msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .iaasse-avatar{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;font-family:'Inter';
  }
  .iaasse-avatar.bot{background:var(--gold-soft);color:#8a6423;}
  .iaasse-avatar.user{background:var(--ink);color:#fff;}
  .iaasse-bubble{
    padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5;
  }
  .iaasse-msg.bot .iaasse-bubble{
    background:#f1efe6;border:1px solid var(--line);border-top-left-radius:4px;
  }
  .iaasse-msg.user .iaasse-bubble{
    background:var(--ink);color:#fff;border-top-right-radius:4px;
  }
  .iaasse-tag{
    display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.4px;
    text-transform:uppercase;margin-bottom:5px;padding:2px 7px;border-radius:5px;
  }
  .iaasse-tag.kb{background:var(--teal-soft);color:var(--teal);}
  .iaasse-tag.general{background:#f2e6d0;color:#8a6423;}

  .iaasse-typing{display:flex;gap:4px;padding:4px 2px;}
  .iaasse-typing span{
    width:6px;height:6px;border-radius:50%;background:#a7a396;
    animation:iaasse-bounce 1.1s infinite ease-in-out;
  }
  .iaasse-typing span:nth-child(2){animation-delay:.15s;}
  .iaasse-typing span:nth-child(3){animation-delay:.3s;}
  @keyframes iaasse-bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-4px);opacity:1;}}

  .iaasse-inputrow{
    display:flex;gap:8px;padding:14px;background:var(--panel);
    border-top:1px solid var(--line);
  }
  .iaasse-input{
    flex:1;border:1px solid var(--line);border-radius:10px;
    padding:11px 14px;font-family:'Inter';font-size:14px;outline:none;
    background:var(--paper);color:var(--ink);
  }
  .iaasse-input:focus{border-color:var(--teal);}
  .iaasse-send{
    background:var(--ink);color:#fff;border:none;border-radius:10px;
    padding:0 18px;font-family:'Inter';font-weight:600;font-size:13.5px;
    cursor:pointer;transition:background .15s;
  }
  .iaasse-send:hover{background:#223454;}
  .iaasse-send:disabled{opacity:.5;cursor:default;}

  .iaasse-keyrow{
    padding:14px 20px;background:var(--teal-soft);border-bottom:1px solid var(--line);
  }
  .iaasse-keytext{font-size:12px;color:var(--ink-soft);margin-bottom:8px;line-height:1.5;}
  .iaasse-keyinputs{display:flex;gap:8px;}
  .iaasse-keystatus{font-size:12px;margin-top:6px;font-weight:600;}
  .iaasse-keystatus.ok{color:var(--teal);}
  .iaasse-keystatus.err{color:#a33d3d;}

  .iaasse-footer{
    text-align:center;font-size:10.5px;color:#9b9683;padding:8px 0 14px;background:var(--panel);
  }
  .iaasse-body::-webkit-scrollbar{width:6px;}
  .iaasse-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
</style>

<div class="iaasse-root">
  <div class="iaasse-header">
    <div class="iaasse-crest">
      <svg viewBox="0 0 24 24" fill="none" stroke="#152238" stroke-width="2"><path d="M12 2L2 8l10 6 10-6-10-6z"/><path d="M2 8v8l10 6 10-6V8"/></svg>
    </div>
    <div>
      <div class="iaasse-title">IAASSE Member Support</div>
      <div class="iaasse-sub">Ask about membership, events, and benefits</div>
    </div>
    <div class="iaasse-status"><span class="iaasse-dot"></span>Online</div>
  </div>

  <div class="iaasse-chips" id="chipRow"></div>

  <div class="iaasse-body" id="chatBody"></div>

  <div class="iaasse-inputrow">
    <input class="iaasse-input" id="chatInput" type="text" placeholder="Type your question..." />
    <button class="iaasse-send" id="sendBtn">Send</button>
  </div>
  <div class="iaasse-footer">Powered by the Claude API · IAASSE AI FAQ Chatbot</div>
</div>

<script>
(function(){
  // ============================================================
  // EDIT THIS SECTION: replace with your real 50+ IAASSE Q&A pairs.
  // Format: "Q: ...\nA: ..." one pair per array item.
  // ============================================================
  const FAQ_KNOWLEDGE_BASE = `
Q: How do I become a member of IAASSE?
A: Visit the IAASSE website, select "Join," fill out the membership application, and pay the applicable dues. New applications are typically reviewed within 5-7 business days.

Q: What are the current membership fees?
A: Membership tiers and fees vary by category (student, professional, institutional). Check the "Membership" page on the IAASSE website for the current fee schedule.

Q: How do I renew my membership?
A: Log in to your member account, go to "My Membership," and click "Renew." Renewal reminders are sent 30 days before expiration.

Q: When and where is the annual IAASSE conference held?
A: The annual conference date and venue are announced on the IAASSE events page each year, typically 6-9 months in advance.

Q: How do I submit a paper or proposal for a conference?
A: Submissions are handled through the conference portal linked on the "Events" page. Check the specific call for papers for deadlines and formatting guidelines.

Q: I forgot my member portal password. What do I do?
A: Click "Forgot Password" on the login page to receive a reset link by email. If you don't receive it within 10 minutes, check your spam folder or contact support.

Q: Does IAASSE offer student memberships?
A: Yes, discounted student memberships are available with proof of current enrollment.

Q: How can I get involved as a volunteer or committee member?
A: Members can apply for open committee positions through the "Get Involved" section of the website, or reach out directly to the relevant committee chair.

Q: How do I update my contact information or email on file?
A: Log in to your member portal and edit your profile under "Account Settings."

Q: Who do I contact for sponsorship or partnership inquiries?
A: Sponsorship inquiries should be directed to the IAASSE partnerships email listed on the "Sponsors" page.
`.trim();
  // ============================================================

  const SYSTEM_PROMPT = `You are the official AI FAQ assistant for IAASSE (a professional member association). Answer member questions warmly, clearly, and concisely (2-4 sentences unless more detail is truly needed).

Use ONLY the knowledge base below as your source of truth for IAASSE-specific facts. If a question is answered by the knowledge base, base your answer on it faithfully. If it is NOT covered by the knowledge base, give a brief, honest, general best-effort answer and suggest the member contact IAASSE support directly for a definitive answer — do not invent specific policies, fees, or dates that aren't in the knowledge base.

KNOWLEDGE BASE:
${FAQ_KNOWLEDGE_BASE}

After your answer, on a new line, output exactly one machine-readable tag with no other text on that line:
@@SOURCE:KB@@   if your answer was grounded in the knowledge base above
@@SOURCE:GENERAL@@   if the knowledge base did not cover this question`;

  const STARTER_CHIPS = ["How do I join?", "Membership fees?", "Reset my password", "Annual conference dates"];

  const chatBody = document.getElementById('chatBody');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const chipRow = document.getElementById('chipRow');

  let history = [];

  function addMessage(role, text, tag){
    const wrap = document.createElement('div');
    wrap.className = 'iaasse-msg ' + (role === 'user' ? 'user' : 'bot');
    const avatar = document.createElement('div');
    avatar.className = 'iaasse-avatar ' + (role === 'user' ? 'user' : 'bot');
    avatar.textContent = role === 'user' ? 'Y' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'iaasse-bubble';
    if(tag){
      const tagEl = document.createElement('div');
      tagEl.className = 'iaasse-tag ' + (tag === 'KB' ? 'kb' : 'general');
      tagEl.textContent = tag === 'KB' ? 'From knowledge base' : 'General answer';
      bubble.appendChild(tagEl);
    }
    const textEl = document.createElement('div');
    textEl.textContent = text;
    bubble.appendChild(textEl);
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatBody.appendChild(wrap);
    chatBody.scrollTop = chatBody.scrollHeight;
    return wrap;
  }

  function addTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'iaasse-msg bot';
    wrap.id = 'typingIndicator';
    wrap.innerHTML = `<div class="iaasse-avatar bot">AI</div><div class="iaasse-bubble"><div class="iaasse-typing"><span></span><span></span><span></span></div></div>`;
    chatBody.appendChild(wrap);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function removeTyping(){
    const el = document.getElementById('typingIndicator');
    if(el) el.remove();
  }

  async function sendMessage(text){
    if(!text.trim()) return;
    addMessage('user', text);
    history.push({role:'user', content: text});
    chatInput.value = '';
    sendBtn.disabled = true;
    addTyping();

    try{
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 500,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });
      const data = await response.json();
      removeTyping();

      if(data.error){
        addMessage('bot', "Something's not set up right on the server: " + data.error.message);
        history.pop();
        return;
      }

      let raw = (data.content || []).map(b => b.text || "").join("");
      let tag = null;
      if(raw.includes("@@SOURCE:KB@@")){ tag = 'KB'; raw = raw.replace("@@SOURCE:KB@@","").trim(); }
      else if(raw.includes("@@SOURCE:GENERAL@@")){ tag = 'GENERAL'; raw = raw.replace("@@SOURCE:GENERAL@@","").trim(); }

      if(!raw) raw = "Sorry, I couldn't generate a response just now. Please try again.";
      addMessage('bot', raw, tag);
      history.push({role:'assistant', content: raw});
    }catch(err){
      removeTyping();
      addMessage('bot', "Something went wrong reaching the assistant. Please try again in a moment.");
      console.error(err);
    }finally{
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
  chatInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(chatInput.value); });

  STARTER_CHIPS.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'iaasse-chip';
    chip.textContent = c;
    chip.addEventListener('click', () => sendMessage(c));
    chipRow.appendChild(chip);
  });

  addMessage('bot', "Hi! I'm the IAASSE support assistant. Ask me about membership, events, dues, or anything else — I'll do my best to help, and I'll flag when something isn't in my official knowledge base.");
})();
</script>
